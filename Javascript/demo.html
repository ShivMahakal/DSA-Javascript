    function debounce(fn,delay){
      let timer;

      return function(...args){
        clearTimeout(timer);
        timer = setTimeout(() => {
            fn(...args)
        }, delay);
      }

    }


    const handleSearch = debounce((e)=> {

    },2000)

    const inputElement = document.getElementById("search-input")

    inputElement.addEventListener("input", handleSearch)
